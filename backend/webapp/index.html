<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto Signals</title>
  <!-- Manifest for PWA -->
  <link rel="manifest" href="manifest.json">
  <!-- Stylesheet (force reload with ?v=2) -->
  <link rel="stylesheet" href="style.css?v=2">
  <!-- OneSignal -->
  <script src="https://cdn.onesignal.com/sdks/OneSignalSDK.js" async=""></script>
  <script>
    window.OneSignal = window.OneSignal || [];
    OneSignal.push(function() {
      OneSignal.init({
        appId: "680aae08-797f-4cfb-9750-64887cc02bbc",
        notifyButton: { enable: false },
        allowLocalhostAsSecureOrigin: true
      });
      OneSignal.showSlidedownPrompt();
    });
  </script>
  <!-- Chart.js and Socket.io -->
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div id="app">
    <header>
      <h1>🔥 Crypto Signals</h1>
      <div class="auto-trade">
        <span>Auto Trade</span>
        <label class="switch">
          <input type="checkbox" id="autoTradeToggle">
          <span class="slider"></span>
        </label>
      </div>
    </header>

    <!-- Tab Navigation -->
    <div class="tabs">
      <button id="tab-signals" class="tab active" onclick="switchTab('signals')">📊 Signals</button>
      <button id="tab-history" class="tab" onclick="switchTab('history')">📋 History</button>
    </div>

    <!-- Signals Section -->
    <section id="signals-section">
      <h2>High Confidence Signals</h2>
      <div id="signalList"></div>
    </section>

    <!-- History Section (hidden by default) -->
    <section id="history-section" style="display: none;">
      <h2>📅 Past Signals</h2>
      <div id="historyList"></div>
    </section>

    <!-- Meme Coins Section (always visible) -->
    <section id="meme-coins">
      <h2>🐶 New Solana Meme Coins</h2>
      <div id="memeList"></div>
    </section>

    <!-- Chart Modal -->
    <div id="chartModal" class="modal">
      <div class="modal-content">
        <span class="close">&times;</span>
        <canvas id="priceChart"></canvas>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
